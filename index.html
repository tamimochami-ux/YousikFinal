<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>YOUsics PRO</title>

<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4841079120157860"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#050806;
  color:white;
  display:flex;
  justify-content:center;
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000;
}

#login input{
  margin:6px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0f1c15;
  color:white;
  width:240px;
  text-align:center;
}

#login button{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00ff88,#00c96a);
  cursor:pointer;
  font-weight:bold;
}

/* APP */
#app{
  display:none;
  width:100%;
  max-width:1200px;
  height:100vh;
}

#container{
  display:flex;
  height:100%;
  gap:15px;
  padding:10px;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#0b120e;
  padding:15px;
  border-radius:16px;
  border:1px solid #1c2b22;
}

.item{
  padding:12px;
  margin:8px 0;
  background:#121f18;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item button{
  background:#00ff88;
  border:none;
  color:#000;
  border-radius:8px;
  padding:3px 8px;
  font-size:11px;
  cursor:pointer;
}

/* CONTENT */
#content{
  flex:1;
  background:#0b120e;
  padding:20px;
  border-radius:16px;
  border:1px solid #1c2b22;
  overflow:auto;
}

#title{
  text-align:center;
  color:#00ff88;
  margin-bottom:15px;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  background:#121f18;
  border-radius:12px;
  margin:8px auto;
  cursor:pointer;
  max-width:600px;
  position:relative;
}

.card img{
  width:50px;
  height:50px;
  border-radius:10px;
}

/* 🔥 ⋮ PLUS GROS */
.menuBtn{
  position:absolute;
  right:12px;
  font-size:26px; /* FIX VISIBILITÉ */
  color:#00ff88;
  cursor:pointer;
  font-weight:bold;
}

/* PLAYER */
#player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:75%;
  max-width:800px;
  background:#000;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:16px;
  border:1px solid #1c2b22;
}

#now{
  min-width:120px;
  font-size:13px;
}

input[type=range]{
  flex:1;
  accent-color:#00ff88;
}

#player button{
  background:#121f18;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}

/* FULL */
#fullPlayer{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#000,#050806);
  display:none;
  justify-content:center;
  align-items:center;
}

#fullBox{
  background:#0b120e;
  padding:25px;
  border-radius:18px;
  text-align:center;
  border:1px solid #1c2b22;
}

#fullBox img{
  width:240px;
  height:240px;
  border-radius:14px;
}

/* HELP */
#helpBtn{
  position:fixed;
  top:15px;
  right:15px;
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(45deg,#00ff88,#00c96a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  z-index:9999;
}
</style>
</head>

<body>

<div id="helpBtn" onclick="toggleHelp()">?</div>

<!-- LOGIN -->
<div id="login">
  <h2>YOUsics 💚</h2>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">
<div id="container">

<div id="sidebar">
<div class="item" onclick="goHome()">🎵 All Songs</div>

<input type="file" id="fileInput" multiple accept="audio/*">

<h3>PLAYLISTS</h3>
<div id="playlistBox"></div>
<button onclick="createPlaylist()">+ Playlist</button>

</div>

<div id="content">
<h2 id="title">All Songs</h2>
<div id="grid"></div>
</div>

</div>
</div>

<!-- PLAYER -->
<div id="player">
<div id="now">Nothing</div>
<input type="range" id="progressBar">
<div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<!-- FULL -->
<div id="fullPlayer">
<div id="fullBox">
<img id="bigImg">
<h2 id="bigTitle"></h2>
<input type="range" id="progress">
<div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>
<button onclick="closeFull()">Close</button>
</div>
</div>

<audio id="audio"></audio>

<script>

/* LOGIN */
function login(){
  const u=document.getElementById("loginUser").value.trim();
  const p=document.getElementById("loginPass").value.trim();

  if(!u||!p) return alert("Remplis les champs");

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  if(!users[u]){
    users[u]={pass:p,songs:[],playlists:[]};
  }

  if(users[u].pass!==p){
    return alert("Mot de passe incorrect");
  }

  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",u);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadUser();
}

/* AUTO LOGIN + FIX RENDER */
window.onload=()=>{
  let u=localStorage.getItem("currentUser");
  if(u){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadUser();
    render(); // 🔥 FIX IMPORTANT
  }
};

/* DATA */
const grid=document.getElementById("grid");
const playlistBox=document.getElementById("playlistBox");
const title=document.getElementById("title");
const fileInput=document.getElementById("fileInput");
const now=document.getElementById("now");
const fullPlayer=document.getElementById("fullPlayer");
const bigTitle=document.getElementById("bigTitle");
const bigImg=document.getElementById("bigImg");
const audio=document.getElementById("audio");
const progress=document.getElementById("progress");
const progressBar=document.getElementById("progressBar");

let songs=[];
let playlists=[];
let current=0;
let mode="all";
let currentPlaylist=null;
let currentUser=null;

/* LOAD */
function loadUser(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  let u=localStorage.getItem("currentUser");

  songs=users[u]?.songs||[];
  playlists=users[u]?.playlists||[];
  currentUser=u;

  render();
}

/* SAVE */
function save(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  users[currentUser].songs=songs;
  users[currentUser].playlists=playlists;
  localStorage.setItem("users",JSON.stringify(users));
}

/* UPLOAD */
fileInput.onchange=e=>{
  for(let f of e.target.files){
    songs.push({
      name:f.name,
      url:URL.createObjectURL(f),
      img:"https://picsum.photos/200?"+Math.random()
    });
  }
  save();
  render();
};

/* LIST SAFE FIX */
function list(){
  if(mode==="playlist" && currentPlaylist && currentPlaylist.songs){
    return currentPlaylist.songs;
  }
  return songs || []; // 🔥 FIX BUG AFFICHAGE
}

/* PLAY */
function play(i){
  let l=list();
  if(!l.length)return;

  current=i;
  audio.src=l[i].url;
  audio.currentTime=0;
  audio.play();

  now.innerText=l[i].name;
  bigTitle.innerText=l[i].name;
  bigImg.src=l[i].img;

  fullPlayer.style.display="flex";
}

/* CONTROLS */
function toggle(){audio.paused?audio.play():audio.pause();}
function next(){let l=list();current=(current+1)%l.length;play(current);}
function prev(){let l=list();current=(current-1+l.length)%l.length;play(current);}
audio.onended=()=>next();

audio.ontimeupdate=()=>{
  if(audio.duration){
    let v=(audio.currentTime/audio.duration)*100;
    progress.value=v;
    progressBar.value=v;
  }
};

function closeFull(){fullPlayer.style.display="none";}

/* PLAYLIST */
function createPlaylist(){
  let n=prompt("Nom playlist ?");
  if(!n)return;
  playlists.push({name:n,songs:[]});
  save();
  render();
}

/* DELETE PLAYLIST */
function deletePlaylist(i){
  if(confirm("Supprimer playlist ?")){
    playlists.splice(i,1);
    save();
    render();
  }
}

/* MENU */
function menu(i){
  let l=list();
  let s=l[i];

  let a=prompt("1 rename\n2 image\n3 delete\n4 playlist");

  if(a=="1"){let n=prompt("name",s.name);if(n)s.name=n;}

  if(a=="2"){
    let inp=document.createElement("input");
    inp.type="file";
    inp.accept="image/*";
    inp.onchange=()=>{
      let fr=new FileReader();
      fr.onload=()=>{
        s.img=fr.result;
        save();
        render();
      };
      fr.readAsDataURL(inp.files[0]);
    };
    inp.click();
  }

  if(a=="3"){l.splice(i,1);}
  if(a=="4"){
    let p=prompt("playlist name");
    let pl=playlists.find(x=>x.name===p);
    if(pl)pl.songs.push({...s});
  }

  save();
  render();
}

/* HELP */
function toggleHelp(){
  alert(`🎧 YOUsics PRO

✔ Musiques affichées OK
✔ Upload MP3
✔ Playlists + delete
✔ ⋮ options
✔ Player complet
✔ UI corrigée`);
}

/* RENDER */
function render(){
  grid.innerHTML="";
  playlistBox.innerHTML="";

  list().forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <img src="${s.img}">
      <div>${s.name}</div>
      <span class="menuBtn" onclick="event.stopPropagation();menu(${i})">⋮</span>
    `;
    d.onclick=()=>play(i);
    grid.appendChild(d);
  });

  playlists.forEach((p,i)=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerHTML=`${p.name} <button onclick="event.stopPropagation();deletePlaylist(${i})">X</button>`;
    d.onclick=()=>openPlaylist(i);
    playlistBox.appendChild(d);
  });
}

function openPlaylist(i){
  currentPlaylist=playlists[i];
  mode="playlist";
  title.innerText=currentPlaylist.name;
  render();
}

function goHome(){
  mode="all";
  currentPlaylist=null;
  title.innerText="All Songs";
  render();
}

</script>

</body>
</html>
